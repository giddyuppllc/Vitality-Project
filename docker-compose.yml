version: '3.9'

services:
  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vitality_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vitality_app
    restart: unless-stopped
    env_file: .env.production
    environment:
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
      # CoA PDFs uploaded via /admin/coa/new must survive container rebuilds.
      # Without this mount, /app/public/coa lives inside the image and every
      # `docker compose up -d --build` wipes the uploads silently.
      - ./public/coa:/app/public/coa

  # ─── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vitality_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
      # Mounts the CoA upload directory read-only so nginx can serve the
      # files directly without going through Next.js (which can't see
      # files added at runtime — see nginx.conf comment).
      - ./public/coa:/coa-files:ro
    depends_on:
      - app

volumes:
  redis-data:
  nginx-logs:
